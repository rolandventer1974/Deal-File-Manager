<VirtualHost *:80>
    ServerName dealfilemanager.co.za
    ServerAlias www.dealfilemanager.co.za

    # Redirect HTTP to HTTPS
    Redirect permanent / https://dealfilemanager.co.za/
</VirtualHost>

<VirtualHost *:443>
    ServerName dealfilemanager.co.za
    ServerAlias www.dealfilemanager.co.za

    DocumentRoot /var/www/dealfilemanager/public

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/your-cert.crt
    SSLCertificateKeyFile /etc/ssl/private/your-key.key
    SSLCertificateChainFile /etc/ssl/certs/your-chain.crt

    # Security Headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Logging
    ErrorLog /var/log/apache2/dealfilemanager-error.log
    CustomLog /var/log/apache2/dealfilemanager-access.log combined

    <Directory /var/www/dealfilemanager/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Rewrite rules
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ /index.php [QSA,L]
        </IfModule>
    </Directory>

    # Deny access to sensitive directories
    <Directory /var/www/dealfilemanager>
        <FilesMatch "^\.|(\.env|composer|package|vendor)" >
            Order allow,deny
            Deny from all
        </FilesMatch>
    </Directory>

    # PHP Configuration
    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php/php8.0-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # Compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/plain text/html text/xml text/css text/javascript application/javascript application/xml
    </IfModule>
</VirtualHost>
