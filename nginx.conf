server {
    listen 80;
    listen [::]:80;
    server_name dealfilemanager.co.za www.dealfilemanager.co.za;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dealfilemanager.co.za www.dealfilemanager.co.za;

    # SSL Configuration
    ssl_certificate /etc/ssl/certs/your-cert.crt;
    ssl_certificate_key /etc/ssl/private/your-key.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Root directory
    root /var/www/dealfilemanager/public;
    index index.php index.html index.htm;

    # Logging
    access_log /var/log/nginx/dealfilemanager-access.log;
    error_log /var/log/nginx/dealfilemanager-error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss;

    # PHP-FPM upstream
    upstream php-handler {
        server unix:/run/php/php8.0-fpm.sock;
    }

    # Static files
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PHP files
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass php-handler;
    }

    # Deny access to sensitive files
    location ~ /(\.|\.env|config|database|logs|vendor) {
        deny all;
    }

    # URL rewriting
    location / {
        if (!-e $request_filename) {
            rewrite ^(.*)$ /index.php last;
        }
    }

    # Uploads directory
    location ^~ /uploads/ {
        try_files $uri =404;
    }
}
